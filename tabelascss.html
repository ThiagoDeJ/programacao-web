<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tabelas</title>
	<style>
		table,th,td{
			position: center;
			border: 1px solid black;
			border-collapse: collapse;
			width: 50%;
			text-align: center;
			padding: 8px;
			border-color: red;

			margin-left: auto;
			margin-right: auto;
			width: 50%;
			th{
				background-color: #ADD8E6;
			}
		}
	</style>
</head>
<body>
	<table>
		<tr>
			<th colspan="3">Produtos</th>
		</tr>
		<tr>
			<th>Nome</th>
			<th>Valor</th>
			<th>Quantidade</th>
		</tr>
		<tr>
			<td>Balão</td>
			<td>10,00</td>
			<td>50</td>
		</tr>
		<tr>
			<td>Chiclete</td>
			<td>15,00</td>
			<td>15</td>
		</tr>
		<tr>
			<td>Chocolate</td>
			<td>23,00</td>
			<td>50</td>
		</tr>
	</table>

</body>
</html>
